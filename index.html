<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로봇 개발 표준 보고 체계</title>
<!-- 캐시 우회: 수정 후 새로고침만 해도 styles.css가 바로 반영됨 -->
<script>document.write('<link rel="stylesheet" href="styles.css?t=' + Date.now() + '">');</script>
</head>
<body>
<div class="app">

  <aside class="side">
    <div class="brand"><div class="logo" id="brand-logo">R</div><b id="brand-name">Robot Reliability<br>Portfolio</b></div>
    <nav class="nav" id="nav"></nav>
    <div class="sgoals" id="side-goals"></div>
    <div id="side-line"></div>
    <div id="side-months"></div>
    <div class="foot"><span class="dot">●</span> <span id="foot-brand">FRACAS + 신뢰성 성장</span><br><span id="foot-updated">—</span></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1 id="page-title">로봇 개발 표준 보고 체계</h1>
      <div class="meta" id="topmeta"></div>
      <div class="sp"></div><div class="tb-lc" id="topbar-lc"></div><button class="btn" id="print-btn" onclick="window.print()">PDF 리포트</button>
    </div>

    <div id="s-home"></div>
    <section id="s-overview" class="sbox" style="display:none"></section>
    <div class="sbox sbox-steps" id="s-steps" style="display:none"></div>
  </main>
</div>

<!-- 에러 상세 모달 -->
<div class="modal-back" id="modal-back" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-h"><h3 id="modal-title">에러 상세</h3><button class="x" onclick="closeModal()">✕</button></div>
    <div class="modal-b" id="modal-body"></div>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')"><img id="lightbox-img" alt=""></div>

<!-- 캐시 우회: 수정 후 새로고침만 해도 JS가 바로 반영됨. 로드 순서 고정: core → 템플릿 → 홈 → app(라우터) -->
<script>
  ['core.js', 'tpl-mass.js', 'tpl-dev.js', 'home.js', 'app.js'].forEach(function (f) {
    document.write('<script src="' + f + '?t=' + Date.now() + '"><\/script>');
  });
</script>
</body>
</html>
